aid: fudan
name: Fudan University
description: >-
  Fudan University is a major public research university in Shanghai, China,
  ranked #84 in the QS World University Rankings 2025. It operates a Dataverse
  research data repository (Fudan University Dataverse, launched in 2014) hosting
  tens of thousands of files across social science, demography, and economics
  datasets, and maintains the China Open Data Index via its Digital and Mobile
  Governance Laboratory. As of this review, Fudan exposes no openly documented,
  publicly reachable developer API program: its Dataverse host (which by the
  Dataverse software design provides a native REST API and OAI-PMH) returns an
  access-forbidden page to requests originating outside mainland China, and the
  official GitHub organization carries no public repositories.
