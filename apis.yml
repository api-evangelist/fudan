    name: Fudan University Dataverse (Research Data Repository)
    description: >-
      Fudan University Dataverse is a research data repository built on the
      Dataverse open-source platform, hosting survey, census, and social-science
      datasets contributed by Fudan researchers. The Dataverse software exposes a
      native REST/Search API and OAI-PMH metadata harvesting by design; however,
      from outside mainland China the host (dvn.fudan.edu.cn) returns an
      access-forbidden ("禁止访问") page, so the API surface is geo-restricted and
      not publicly documented. Endpoint paths below reflect standard Dataverse
      conventions, not Fudan-published documentation, and could not be verified
      live.
