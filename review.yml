    summary: >-
      No openly documented, publicly reachable developer API program was found
      for Fudan University. The official website and English site resolve. A
      Fudan University Dataverse research-data repository exists at
      dvn.fudan.edu.cn; the host returns HTTP 200 but serves an access-forbidden
      ("禁止访问") page to requests from outside mainland China, so the standard
      Dataverse REST API and OAI-PMH endpoints could not be verified live and
      are effectively geo-gated. The official GitHub organization
      (github.com/FudanUniversity) exists but has zero public repositories. No
      endpoints, keys, or specs were fabricated; only confirmed properties are
      cataloged.
